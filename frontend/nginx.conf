server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Reverse-proxy API calls to the backend service over the compose network,
    # so the browser only ever talks to this one origin (no CORS needed). Using
    # a resolver plus a variable upstream lets nginx pick up the backend's new
    # address if its container restarts, rather than caching a stale one at boot.
    location /api/ {
        resolver 127.0.0.11 valid=10s;
        set $upstream http://backend:3000;
        proxy_pass $upstream$request_uri;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # SPA fallback: serve index.html so the client-side router can resolve deep
    # links and refreshes (mirrors frontend/public/_redirects used on Netlify).
    location / {
        try_files $uri $uri/ /index.html;
    }
}
